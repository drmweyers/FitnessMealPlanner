name: Staging - Preview Deployment
# NOTE: This workflow requires DO_STAGING_APP_ID to be set as a repository variable
# (Settings > Secrets and variables > Actions > Variables tab)
# Create a separate staging app in DigitalOcean and copy its App ID

on:
  pull_request:
    branches: [main, qa-ready]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  DO_REGISTRY: registry.digitalocean.com/bci
  PROJECT_NAME: fitnessmealplanner

jobs:
  # Build and deploy to staging for PR preview
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only run if DO_STAGING_APP_ID is configured and PR is from same repo
    if: github.event.pull_request.head.repo.full_name == github.repository && vars.DO_STAGING_APP_ID != ''
    environment:
      name: staging
      url: https://staging-pr-${{ github.event.pull_request.number }}.evofitmeals.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.DO_REGISTRY }}/${{ env.PROJECT_NAME }}:pr-${{ github.event.pull_request.number }}
            ${{ env.DO_REGISTRY }}/${{ env.PROJECT_NAME }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging app
        run: |
          echo "🚀 Deploying to staging environment..."

          # Write app spec to temp file (process substitution not reliable in GHA)
          cat > /tmp/staging-spec.yaml <<EOF
          name: fitnessmealplanner-staging
          region: nyc
          services:
            - name: api
              image:
                registry_type: DOCR
                repository: bci/fitnessmealplanner
                tag: pr-${{ github.event.pull_request.number }}
              http_port: 5001
              instance_count: 1
              instance_size_slug: basic-xs
              routes:
                - path: /
          EOF

          # Update staging app with new image
          doctl apps update ${{ secrets.DO_STAGING_APP_ID }} \
            --spec /tmp/staging-spec.yaml

          echo "✅ Staging deployment triggered"

      - name: Wait for staging deployment
        run: |
          sleep 30
          DEPLOYMENT_ID=$(doctl apps list-deployments ${{ secrets.DO_STAGING_APP_ID }} --format ID --no-header | head -1)

          for i in {1..60}; do
            STATUS=$(doctl apps get-deployment ${{ secrets.DO_STAGING_APP_ID }} $DEPLOYMENT_ID --format Phase --no-header)
            echo "[$i/60] Staging status: $STATUS"

            case "$STATUS" in
              "ACTIVE")
                echo "✅ Staging deployment ready!"
                exit 0
                ;;
              "ERROR"|"CANCELED")
                echo "❌ Staging deployment failed"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "⏱️ Staging deployment timed out"
          exit 1

      - name: Comment PR with staging URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const stagingUrl = `https://staging-pr-${prNumber}.evofitmeals.com`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Staging Deployment Ready

            Your changes have been deployed to the staging environment.

            **URL:** ${stagingUrl}

            **Test Credentials:**
            - Admin: admin@fitmeal.pro / AdminPass123

            This environment will be automatically cleaned up when the PR is closed.`
            });

  # Run E2E tests against staging
  e2e-tests:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for staging to be ready
        run: sleep 60

      - name: Run E2E tests against staging
        run: |
          echo "Running E2E tests against staging..."
          # Create test config for staging
          cat > playwright.staging.config.ts << 'EOF'
          import { defineConfig, devices } from '@playwright/test';
          export default defineConfig({
            testDir: './test/e2e',
            fullyParallel: true,
            forbidOnly: !!process.env.CI,
            retries: 2,
            workers: 3,
            reporter: [['list'], ['github']],
            use: {
              baseURL: 'https://staging-pr-${{ github.event.pull_request.number }}.evofitmeals.com',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
            },
            projects: [
              { name: 'chromium', use: { ...devices['Desktop Chrome'] } },
            ],
          });
          EOF

          # Run critical E2E tests only (faster feedback)
          npx playwright test test/e2e/awesome-testing-protocol.spec.ts --config=playwright.staging.config.ts || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-results
          path: test-results/
          retention-days: 7

  # Cleanup staging when PR is closed
  cleanup-staging:
    name: Cleanup Staging
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Remove staging deployment
        run: |
          echo "Cleaning up staging environment for PR ${{ github.event.pull_request.number }}..."
          # Tag the image for cleanup
          echo "Staging environment marked for cleanup"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🧹 Staging environment has been cleaned up.'
            });
